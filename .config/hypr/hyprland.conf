# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

source = ~/.cache/wal/colors-hyprland.conf

# Monitors
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,highres,0x0,1.6
monitor=HDMI-A-1,1920x1080@120,2560x0,1
workspace=1,monitor:eDP-1,1
workspace=2,monitor:eDP-1,1
workspace=3,monitor:eDP-1,1
workspace=4,monitor:eDP-1,1
workspace=5,monitor:eDP-1,1
workspace=6,monitor:eDP-1,1
workspace=7,monitor:eDP-1,1
workspace=8,monitor:eDP-1,1
workspace=9,monitor:eDP-1,1
workspace=10,monitor:eDP-1,1

workspace=11,monitor:HDMI-A-1,11
workspace=12,monitor:HDMI-A-1,11
workspace=13,monitor:HDMI-A-1,11
workspace=14,monitor:HDMI-A-1,11
workspace=15,monitor:HDMI-A-1,11
workspace=16,monitor:HDMI-A-1,11
workspace=17,monitor:HDMI-A-1,11
workspace=18,monitor:HDMI-A-1,11
workspace=19,monitor:HDMI-A-1,11
workspace=20,monitor:HDMI-A-1,11

bind=SUPER,1,workspace,1
bind=SUPER+CTRL,1,workspace,11
bind=SUPER+CTRL,2,workspace,12
bind=SUPER+CTRL,3,workspace,13
bind=SUPER+CTRL,4,workspace,14
bind=SUPER+CTRL,5,workspace,15
bind=SUPER+CTRL,6,workspace,16
bind=SUPER+CTRL,7,workspace,17
bind=SUPER+CTRL,8,workspace,18
bind=SUPER+CTRL,9,workspace,19
bind=SUPER+CTRL,0,workspace,20


bind=SUPER+CTRL+SHIFT,1,movetoworkspace,11
bind=SUPER+CTRL+SHIFT,2,movetoworkspace,12
bind=SUPER+CTRL+SHIFT,3,movetoworkspace,13
bind=SUPER+CTRL+SHIFT,4,movetoworkspace,14
bind=SUPER+CTRL+SHIFT,5,movetoworkspace,15

bind=SUPER+SHIFT,right,movetoworkspace,+1
bind=SUPER+SHIFT,left,movetoworkspace,-1

bind=SUPER,tab,swapnext
bind=SUPER+SHIFT,tab,swapnext, prev

# Programs
$terminal = kitty
$browser = firefox
$fileManager = thunar
# $menu = wofi --show drun
$menu = fuzzel


# Autostart

exec-once = pipewire & pipewire-pulse & wireplumber
exec-once = export $(dbus-launch)
exec-once = waybar
exec-once = hyprpaper & dunst
exec-once = /usr/bin/pypr
exec-once = copyq --start-server
exec-once = nm-applet
exec-once = sunset
exec-once = wallpaper set -rp -c other
exec-once = swayidle -w timeout 300 'lock' timeout 360 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep 'lock'
exec-once = sway-audio-idle-inhibit

# Environment variables
# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GDK_SCALE,1.6

# Hyprland variables
# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color10 $color11 90deg #rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = $color6 #rgba(595959aa)
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {

        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }


    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    # new_is_master = true
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    # workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}



# Keybinds
# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, S, exec, $terminal

bind = $mainMod, grave, exec, pypr toggle term
bind = $mainMod, Z, exec, pypr zoom
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod ALT_R, M, exit,
bind = $mainMod, f, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, exec, $menu
bind = $mainMod, A, exec, $menu

bind = $mainMod SHIFT, P, exec, hyprctl --batch "dispatch togglefloating; dispatch pin"
bind = $mainMod, c, exec, hyprctl --batch "dispatch resizeactive exact 50% 50%; dispatch centerwindow"


bind = $mainMod, R, exec, pkill -SIGUSR1 waybar

# Move focus with mainMod + vim keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Resize focus with mainMod + vim keys
binde = $mainMod SHIFT, h, resizeactive, -50 0
binde = $mainMod SHIFT, l, resizeactive, 50 0
binde = $mainMod SHIFT, k, resizeactive, 0 -50
binde = $mainMod SHIFT, j, resizeactive, 0 50
binde = $mainMod SHIFT, f, fullscreen
binde = $mainMod SHIFT, m, moveactive


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume Control
binde = , XF86AudioRaiseVolume, exec, setvolume inc 5
binde = , XF86AudioLowerVolume, exec, setvolume dec 5
bind = , XF86AudioMute, exec, setvolume
bind = , XF86AudioMicMute, exec, togglemic

# Media Control
bind = , XF86AudioMedia, exec, playerctl play-pause
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioStop, exec, playerctl stop
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next

# Brightness Control
binde = , XF86MonBrightnessUp, exec, setbrightness inc 5
binde = , XF86MonBrightnessDown, exec, setbrightness dec 5
binde = $mainMod, XF86MonBrightnessUp, exec, setbrightness inc 1
binde = $mainMod, XF86MonBrightnessDown, exec, setbrightness dec 1

# Screensaver key
bind = , XF86ScreenSaver, exec,~/.scripts/lock
bind = $mainMod ALT_R, L, exec, lock

# Others
bind = , XF86Calculator, exec, gnome-calculator
bind = , XF86Search, exec, wofi

bind = $mainMod, B, exec, GRIMBLAST_EDITOR='satty --filename' grimblast -n -f edit area
bind = , Print, exec, GRIMBLAST_EDITOR='satty --filename' grimblast -n -f edit screen
bind = $mainMod, W, exec, wallpaper set -rp -c other
bind = $mainMod SHIFT, W, exec, wallpaper set -rp -c anime
bind = $mainMod, XF86AudioPlay, exec, hyprfreeze -a
bind = $mainMod, K, exec, keyboard_backlight toggle
bind = $mainMod SHIFT, K, exec, xkill
bindl = $mainMod, D, exec, hyprctl dispatch dpms toggle

# Performance mode
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/gamemode.sh

windowrule = suppress_event maximize, match:class .* # You'll probably like this.

windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Calculator)$
windowrule = float on, match:title ^(AvatarTool)
windowrule = float on, match:class ^(egui-app)$

windowrule = opacity 0.95 0.75, match:title ^(Picture-in-Picture)$
windowrule = opacity 0.7, match:class ^(io.bassi.Amberol)$

# windowrule = size 30% 30%, title:^(Picture-in-Picture)$

windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = move 100%-w-20 100%-w-20, match:title ^(Picture-in-Picture)$
windowrule = move onscreen cursor -50% -50%, match:title ^(Calculator)$


windowrule = keep_aspect_ratio on, match:title ^(Picture-in-Picture)$

xwayland {
	force_zero_scaling = true
}


plugin {
    hyprbars {
		enabled = false
        bar_height = 20

        hyprbars-button = rgb(ff4040), 10, , hyprctl dispatch killactive
        hyprbars-button = rgb(eeee11), 10, , hyprctl dispatch fullscreen 1

        on_double_click = hyprctl dispatch fullscreen 1
		bar_buttons_alignment = left
		bar_blur = false
    }
}
