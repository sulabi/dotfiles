# BEGIN_KITTY_THEME
# One Dark
include current-theme.conf
font_family      JetBrains Mono NL Regular
font_size	 12.0
symbol_map		 U+EA900-U+EA962	madness
italic_font      auto
bold_font        auto
bold_italic_font auto


# The cursor color
cursor           #65C1CD

# The cursor shape can be one of (block, beam, underline)
shell_integration no-cursor
cursor_shape underline

# The interval (in seconds) at which to blink the cursor. Set to zero to
# disable blinking.
cursor_blink_interval     0.5

term kitty
window_padding_width 5
background_opacity	0.9

confirm_os_window_close 0
# END_KITTY_THEME

include "~/.cache/wal/colors-kitty.conf"

map ctrl+shift+f launch --type=overlay --stdin-source=@screen_scrollback /bin/sh -c "/usr/bin/fzf --no-sort --no-mouse --exact -i --tac | kitty +kitten clipboard"
